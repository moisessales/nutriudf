services:
  - type: web
    name: nutriudf-api
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: gateway01.ap-northeast-1.prod.aws.tidbcloud.com
      - key: DB_PORT
        value: "4000"
      - key: DB_USER
        value: 3LHa2iJiwx2pESx.root
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: nutriudf
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGIN
        value: https://nutriudf-api.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: moisessales150@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: APP_URL
        value: https://nutriudf-api.onrender.com
